name: PRL Docker CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'base/**'
      - 'robots/mantis/**'
      - 'robots/franka/**'
      - 'robots/tiago-pro/**'
      - '.github/workflows/ci.yml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual triggering of the workflow

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}-base
  IMAGE_MANTIS: ${{ github.repository }}-mantis
  IMAGE_FRANKA: ${{ github.repository }}-franka
  IMAGE_TIAGO_PRO: ${{ github.repository }}-tiago-pro

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.schedule-check.outputs.base || steps.changed-files.outputs.base_any_changed }}
      mantis: ${{ steps.schedule-check.outputs.mantis || steps.changed-files.outputs.mantis_any_changed }}
      franka: ${{ steps.schedule-check.outputs.franka || steps.changed-files.outputs.franka_any_changed }}
      tiago-pro: ${{ steps.schedule-check.outputs.tiago-pro || steps.changed-files.outputs.tiago-pro_any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Force rebuild on schedule or manual trigger
        id: schedule-check
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "base=true" >> $GITHUB_OUTPUT
          echo "mantis=true" >> $GITHUB_OUTPUT
          echo "franka=true" >> $GITHUB_OUTPUT
          echo "tiago-pro=true" >> $GITHUB_OUTPUT

      - name: Detect file changes
        id: changed-files
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            base:
              - 'base/**'
            mantis:
              - 'robots/mantis/Dockerfile.mantis'
              - 'robots/mantis/setup_mantis.sh'
            franka:
              - 'robots/franka/Dockerfile.franka'
              - 'robots/franka/setup_franka.sh'
            tiago-pro:
              - 'robots/tiago-pro/**'

  build-base:
    needs: detect-changes
    if: needs.detect-changes.outputs.base == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set labels and dates
        run: |
          echo "DATE_TAG=$(date +'%Y-%m')" >> $GITHUB_ENV

      # --- LOGIC OF BACKUP N-1 ---
      - name: Backup latest to previous
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-latest || true
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-latest \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-previous || true
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-previous || true

      # --- BUILD BASE IMAGE ---
      - name: Build and push Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: base/Dockerfile.base
          push: true
          provenance: false
          build-args: ROS_DISTRO=${{ matrix.ros_distro }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-${{ env.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mantis:
    if: needs.detect-changes.outputs.mantis == 'true' || needs.detect-changes.outputs.base == 'true'
    needs: [detect-changes, build-base]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [jazzy]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set date
        run: echo "DATE_TAG=$(date +'%Y-%m')" >> $GITHUB_ENV

      # --- BACKUP MANTIS ---
      - name: Backup latest to previous
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-latest || true
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-latest \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-previous || true
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-previous || true

      # --- BUILD IMAGE MANTIS ---
      - name: Build and push Mantis Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: robots/mantis/Dockerfile.mantis
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-latest
            ROS_DISTRO=${{ matrix.ros_distro }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_MANTIS }}:${{ matrix.ros_distro }}-${{ env.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-franka:
    if: needs.detect-changes.outputs.franka == 'true' || needs.detect-changes.outputs.base == 'true'
    needs: [detect-changes, build-base]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set date
        run: echo "DATE_TAG=$(date +'%Y-%m')" >> $GITHUB_ENV

      # --- BACKUP FRANKA ---
      - name: Backup latest to previous
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-latest || true
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-latest \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-previous || true
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-previous || true

      # --- BUILD DE L'IMAGE FRANKA ---
      - name: Build and push franka Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: robots/franka/Dockerfile.franka
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}:${{ matrix.ros_distro }}-latest
            ROS_DISTRO=${{ matrix.ros_distro }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRANKA }}:${{ matrix.ros_distro }}-${{ env.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tiago-pro:
    if: needs.detect-changes.outputs.tiago-pro == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [alum]
        track: [edge]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set date
        run: echo "DATE_TAG=$(date +'%Y-%m')" >> $GITHUB_ENV

      # --- BACKUP TIAGO-PRO ---
      - name: Backup latest to previous
        continue-on-error: true
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-latest || true
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-latest \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-previous || true
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-previous || true

      # --- BUILD TIAGO-PRO ---
      - name: Build and push tiago-pro Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: robots/tiago-pro/Dockerfile.base.tiago-pro
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=palrobotics/deploy-alum-${{ matrix.track }}-tiago-pro:latest
            DISTRO=${{ matrix.ros_distro }}
            TRACK=${{ matrix.track }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_TIAGO_PRO }}:${{ matrix.ros_distro }}-${{ matrix.track }}-${{ env.DATE_TAG }}
          secrets: |
            "pal_keys_deb=${{ secrets.PAL_KEYS_DEB }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    needs: [build-base, build-mantis, build-franka, build-tiago-pro]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old package versions (Base)
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: prl_docker-base
          package-type: 'container'
          delete-only-untagged-versions: true
          ignore-versions: |
            humble-latest
            humble-previous
            jazzy-latest
            jazzy-previous

      - name: Delete old package versions (Mantis)
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: prl_docker-mantis
          package-type: 'container'
          delete-only-untagged-versions: true
          ignore-versions: |
            jazzy-latest
            jazzy-previous

      - name: Delete old package versions (Franka)
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: prl_docker-franka
          package-type: 'container'
          delete-only-untagged-versions: true
          ignore-versions: |
            humble-latest
            humble-previous

      - name: Delete old package versions (Tiago-Pro)
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: prl_docker-tiago-pro
          package-type: 'container'
          delete-only-untagged-versions: true
          ignore-versions: |
            alum-edge-latest
            alum-edge-previous
